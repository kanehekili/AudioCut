[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "audiocut"
version = "@xxx@"
description = "MP3/FLAC/WAV audio cutter"
readme = "README.md"
license = {text = "GPL-2.0-or-later"}
requires-python = ">=3.9"
dependencies = ["PyQt6", "numpy"]

[project.urls]
Homepage = "https://github.com/kanehekili/AudioCut"

[project.scripts]
audiocut = "audiocut.AudioCut:main"

[tool.setuptools.package-data]
audiocut = [
    "icons/*",
]
